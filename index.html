<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Holi - Festival of Colors</title>
    <meta name="description" content="A vibrant and interactive greeting for the festival of colors!">
    <link rel="stylesheet" href="style.css">
    <!-- Load modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700&family=Pacifico&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Canvas for confetti -->
    <canvas id="confetti-canvas"></canvas>
    
    <!-- Centered Greeting Card -->
    <main class="card-container">
        <div class="card" id="greeting-card">
            <h1>Happy<br>Holi</h1>
            <p>Wishing you a vibrant and radiant festival of colors! Tap anywhere to splash some color!</p>
        </div>
    </main>

    <!-- Interactive script -->
    <script src="script.js"></script>
</body>
</html>
